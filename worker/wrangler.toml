name = "tidemedix-leads"
main = "src/index.js"
compatibility_date = "2026-05-04"
workers_dev = true

# Branded Worker domain for click/unsubscribe links in email.
routes = [
  { pattern = "links.tidemedix.com", custom_domain = true }
]

# Replace id after running:
#   npx wrangler kv namespace create TIDEMEDIX_LEADS
[[kv_namespaces]]
binding = "TIDEMEDIX_LEADS"
id = "371b7c9c1a544a819c592ab50aecdd93"

[triggers]
crons = ["17 * * * *"]

[vars]
FROM_EMAIL = "TideMedix <care@tidemedix.com>"
AWS_SES_REGION = "us-east-1"
AWS_SES_CONFIGURATION_SET = "tidemedix-events"
CHECKOUT_URL = "https://try.tidemedix.com/intake/wm-4ltue5"
RIMO_INTAKE_URL = "https://try.tidemedix.com/intake/wm-4ltue5"
PATIENT_PORTAL_URL = "https://try.tidemedix.com/sign-in?returnTo=%2F"
FUNNEL_URL = "https://go.tidemedix.com/"
PUBLIC_BASE_URL = "https://links.tidemedix.com"
META_PIXEL_ID = "1282887087139606"
